# =============================================
#   Site Settings
# =============================================
title: "Samrat Dutta Roy | Tech Blog"
description: "Technical deep-dives on frontend architecture, browser engines, JavaScript internals, and web performance by a Senior Frontend Engineer."
keywords: [samrat dutta roy, dev blog, web performance, software engineering, frontend development, browser internals, javascript, system design]
author: "Samrat Dutta Roy"
email: samratduttaroy008@gmail.com

url: "https://dutta-roy-samrat.github.io"
baseurl: ""

# Social & SEO Previews
image: "/assets/images/notion-cover.png"
twitter:
  card: summary_large_image


# =============================================
#   Build Settings
# =============================================
theme: minima
markdown: kramdown
highlighter: rouge

sass:
  style: compressed

kramdown:
  input: GFM
  syntax_highlighter: rouge

# =============================================
#   Minima Theme Settings
# =============================================
minima:
  skin: classic

header_pages:
  - hide-nav-links.md


# =============================================
#   Plugins
# =============================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# =============================================
#   Permalink Style
# =============================================
permalink: /posts/:title/

# =============================================
#   Post Defaults
# =============================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Samrat Dutta Roy"

# =============================================
#   Pagination
# =============================================
paginate: 5
paginate_path: "/page/:num/"

# =============================================
#   Social Links
# =============================================
github_username: dutta-roy-samrat
# twitter_username: yourhandle   # uncomment if needed
# linkedin_username: yourhandle  # uncomment if needed

# =============================================
#   Exclude from build
# =============================================
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/
